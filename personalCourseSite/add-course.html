<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <h2>Course Organizer</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Add a New Course</h1>
            <form action="courses.html" method="get">
                <label for="courseName">Course Name</label> 
                <input type="text" id="courseName" name="courseName" placeholder="e.g. statistics-2" required>

                <label for="Instructor">Instructor</label>
                <input type="text" id="Instructor" name="Instructor" placeholder="Instructor's Name" required>

                <label for="creditHours">Credit Hours</label>
                <input type="number" id="creditHours" name="creditHours" min="1" max="6" placeholder="e.g. 3" required>

                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" raws="4" placeholder="Any special lab requirements?"></textarea>

                <button type="submit">Save Course</button>
            </form>

        </section>

    </main>

   

    <footer>
        <p>&copy; 2026 Personal Course Organizer</p>
        <p>Created by <strong>Yahya</strong> | ID: 20251191</p>
    </footer>

</body>
</html>
